name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 26

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Rebuild native modules for Electron
        run: pnpm --filter @fontral/desktop rebuild:native
      - run: pnpm build
      - name: Run vitest via Electron
        run: node vitest-electron.mjs

  build:
    name: Build (${{ matrix.os }})
    needs: [typecheck, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact-name: linux
          - os: windows-latest
            script: dist:win
            artifact-name: windows
          - os: macos-latest
            script: dist:mac
            artifact-name: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build & package
        run: pnpm --filter @fontral/desktop ${{ matrix.script }}
        env:
          # Skip code signing on CI; unsigned artifacts are still produced.
          GH_TOKEN: ''
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fontral-${{ matrix.artifact-name }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
          if-no-files-found: warn
          retention-days: 14
